<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>P2P 双向连接修复版</title>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body{background:#111;color:#fff;padding:20px;font-family:Arial}
        #game{border:2px solid #0f0}
        input,button{padding:8px;margin:5px}
    </style>
</head>
<body>
    <h3>P2P 联机（修复半连接）</h3>
    <p>你的ID：<span id="myId" style="color:#0f0">加载中...</span></p>
    <p>对方ID：<input id="pid" placeholder="输入ID"> <button onclick="link()">连接</button></p>
    <p id="tip">等待连接...</p>
    <canvas id="game" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const myId = document.getElementById('myId');
        const tip = document.getElementById('tip');
        let conn = null;

        // 玩家数据
        const me = {x:100,y:200}, friend={x:400,y:200};

        // 固定Peer，无重建
        const peer = new Peer({
            host:'0.peerjs.com',port:443,secure:true,
            config:{iceServers:[{urls:'stun:stun.cloudflare.com:3478'}]}
        });

        // 初始化ID
        peer.on('open',id=>{myId.textContent=id;tip.textContent='✅ 就绪'});

        // ======================================
        // 核心修复：双向连接监听（主动+被动都处理）
        // ======================================
        function bindConn(c){
            conn = c;
            c.on('open',()=>{tip.textContent='✅ 连接成功！'});
            c.on('data',data=>{friend.x=data.x;friend.y=data.y});
            c.on('error',()=>{tip.textContent='❌ P2P数据通道失败'});
        }

        // 主动连接
        function link(){bindConn(peer.connect(document.getElementById('pid').value))}

        // 被动连接（对方连你，必须有！）
        peer.on('connection',bindConn);

        // 键盘控制
        document.addEventListener('keydown',e=>{
            const s=7;
            switch(e.key){
                case'ArrowUp':me.y-=s;break;case'ArrowDown':me.y+=s;break;
                case'ArrowLeft':me.x-=s;break;case'ArrowRight':me.x+=s;break;
            }
            conn?.send({x:me.x,y:me.y});
        });

        // 渲染
        function draw(){
            ctx.fillStyle='#000';ctx.fillRect(0,0,600,400);
            ctx.fillStyle='#0f0';ctx.fillRect(me.x,me.y,30,30);
            ctx.fillStyle='#f0f';ctx.fillRect(friend.x,friend.y,30,30);
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
