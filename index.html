<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>双人贪吃蛇 · WebRTC P2P 测试</title>
    <link rel="icon" href="data:,">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at top, #1d2b44 0%, #0f1726 40%, #090d16 100%);
            color: #e8f0ff;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 24px 14px 30px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        .panel {
            width: min(900px, 96vw);
            background: rgba(8, 15, 27, 0.75);
            border: 1px solid rgba(170, 220, 255, 0.24);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(6px);
            box-shadow: 0 16px 40px rgba(2, 10, 20, 0.5);
            margin-bottom: 16px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .row:last-child {
            margin-bottom: 0;
        }

        input {
            flex: 1;
            min-width: 180px;
            padding: 10px 12px;
            border: 1px solid #3a5678;
            border-radius: 10px;
            background: #0b1420;
            color: #f2f7ff;
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: #06131d;
            font-weight: 700;
            background: linear-gradient(135deg, #62ffc2 0%, #4fd2ff 100%);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .text {
            color: #b7cae6;
            font-size: 14px;
        }

        #status {
            color: #bfe2ff;
            font-size: 15px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #d8e6ff;
        }

        #game {
            width: min(900px, 96vw);
            border: 2px solid #4fd2ff;
            border-radius: 14px;
            background: #05080f;
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.5);
        }

        .tips {
            width: min(900px, 96vw);
            margin-top: 10px;
            color: #9fb4d3;
            font-size: 13px;
            line-height: 1.6;
        }

        #debugLog {
            width: min(900px, 96vw);
            margin-top: 8px;
            max-height: 140px;
            overflow: auto;
            padding: 10px;
            font-size: 12px;
            color: #a9c8ec;
            background: rgba(6, 12, 22, 0.7);
            border: 1px solid rgba(125, 168, 212, 0.28);
            border-radius: 10px;
            white-space: pre-wrap;
            line-height: 1.45;
        }
    </style>
</head>
<body>
    <h1>双人贪吃蛇（WebRTC P2P）</h1>

    <div class="panel">
        <div class="row">
            <div>你的ID：<b id="myId">生成中...</b></div>
            <div class="text">角色：<b id="role">未连接</b></div>
        </div>
        <div class="row">
            <input id="peerId" placeholder="输入好友ID后点击连接">
            <button id="connectBtn">连接好友</button>
            <button id="startBtn" disabled>开始游戏</button>
            <button id="restartBtn" disabled>重新开局</button>
        </div>
        <div class="row" id="incomingBox" style="display:none;">
            <div class="text" id="incomingText">收到连接请求</div>
            <button id="acceptBtn">接受</button>
            <button id="rejectBtn">拒绝</button>
        </div>
        <div class="row">
            <div id="status">正在初始化连接...</div>
        </div>
    </div>

    <div class="scoreboard">
        <div>绿色玩家（房主）：<b id="scoreA">0</b></div>
        <div>蓝色玩家（加入者）：<b id="scoreB">0</b></div>
        <div>当前状态：<b id="gameState">等待连接</b></div>
    </div>

    <canvas id="game" width="600" height="400"></canvas>
    <div class="tips">
        操作：方向键/WASD 均可控制自己蛇头方向。房主负责同步整个游戏状态；加入者只发送输入指令，双方画面会一致。<br>
        测试方式：A 打开页面获得ID -> B 输入A的ID连接 -> A点“开始游戏”即可联机。<br>
        联机排障：建议用 Chrome 无痕窗口测试，并临时关闭可能拦截网络请求的扩展。
    </div>
    <pre id="debugLog">[调试日志] 页面已加载，等待初始化...</pre>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const myIdEl = document.getElementById('myId');
        const roleEl = document.getElementById('role');
        const statusEl = document.getElementById('status');
        const gameStateEl = document.getElementById('gameState');
        const scoreAEl = document.getElementById('scoreA');
        const scoreBEl = document.getElementById('scoreB');
        const peerIdInput = document.getElementById('peerId');
        const connectBtn = document.getElementById('connectBtn');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const incomingBox = document.getElementById('incomingBox');
        const incomingText = document.getElementById('incomingText');
        const acceptBtn = document.getElementById('acceptBtn');
        const rejectBtn = document.getElementById('rejectBtn');
        const debugLogEl = document.getElementById('debugLog');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;
        const TICK_MS = 130;

        let conn = null;
        let isHost = false;
        let gameTimer = null;
        let gameRunning = false;
        let localPlayer = null;
        let peerReady = false;
        let isConnecting = false;
        let pendingIncomingConn = null;
        let connectedPeerId = '';

        const state = {
            snakes: {
                A: [],
                B: []
            },
            dirs: {
                A: { x: 1, y: 0 },
                B: { x: -1, y: 0 }
            },
            pendingDirs: {
                A: { x: 1, y: 0 },
                B: { x: -1, y: 0 }
            },
            food: { x: 0, y: 0 },
            scores: { A: 0, B: 0 },
            gameOver: false,
            winner: ''
        };

        const isFileProtocol = location.protocol === 'file:';
        if (isFileProtocol) {
            connectBtn.disabled = true;
            startBtn.disabled = true;
            restartBtn.disabled = true;
            myIdEl.textContent = '不可用';
            setStatus('检测到你正在使用 file:// 打开页面。请先启动本地HTTP服务，再通过 http://localhost 访问。');
            setGameState('被浏览器安全策略阻止');
            roleEl.textContent = '不可用（需HTTP）';
            log('检测到 file 协议，已禁止联机功能。');
        }

        let peer = null;
        if (!isFileProtocol) {
            bootstrapPeer();
        }

        connectBtn.addEventListener('click', () => {
            const targetId = peerIdInput.value.trim();
            if (!targetId) {
                alert('请输入对方ID');
                return;
            }
            if (!peer || !peerReady) {
                setStatus('Peer 尚未就绪，请稍后再试。');
                log('主动连接失败：Peer 未准备好。');
                return;
            }
            if (targetId === myIdEl.textContent) {
                setStatus('不能连接自己的ID。');
                log('主动连接失败：目标是自己。');
                return;
            }
            if (conn && conn.open) {
                setStatus('已连接到 ' + connectedPeerId + '，请先刷新页面后再连接其他目标。');
                log('已连接状态下拒绝发起新连接。');
                return;
            }
            if (isConnecting) {
                setStatus('正在连接中，请稍候。');
                log('重复点击连接被忽略。');
                return;
            }

            hideIncomingRequest();
            isConnecting = true;
            connectBtn.disabled = true;
            connectBtn.textContent = '连接中...';
            conn = peer.connect(targetId);
            setupConnection(conn, false);
            log('正在主动连接目标ID：' + targetId);
        });

        acceptBtn.addEventListener('click', () => {
            if (!pendingIncomingConn) return;
            if (conn && conn.open) {
                pendingIncomingConn.close();
                pendingIncomingConn = null;
                hideIncomingRequest();
                return;
            }
            isHost = true;
            localPlayer = 'A';
            roleEl.textContent = '房主（绿色）';
            conn = pendingIncomingConn;
            pendingIncomingConn = null;
            hideIncomingRequest();
            isConnecting = true;
            connectBtn.disabled = true;
            connectBtn.textContent = '连接中...';
            setStatus('正在接受连接请求...');
            log('用户已接受来电请求。');
            setupConnection(conn, true);
        });

        rejectBtn.addEventListener('click', () => {
            if (pendingIncomingConn) {
                pendingIncomingConn.close();
                log('用户已拒绝来电请求。');
            }
            pendingIncomingConn = null;
            hideIncomingRequest();
            setStatus('已拒绝该连接请求。');
        });

        startBtn.addEventListener('click', () => {
            if (!isHost || !conn || !conn.open) return;
            resetState();
            startGameLoop();
            broadcast({ type: 'game_start', payload: getPublicState() });
            setGameState('游戏进行中');
            setStatus('已开始游戏，祝你好运。');
        });

        restartBtn.addEventListener('click', () => {
            if (!isHost || !conn || !conn.open) return;
            resetState();
            startGameLoop();
            broadcast({ type: 'game_start', payload: getPublicState() });
            setGameState('游戏进行中');
            setStatus('已重新开局。');
        });

        function setupConnection(activeConn, asHost) {
            if (!activeConn) return;
            activeConn.on('open', () => {
                conn = activeConn;
                isConnecting = false;
                connectedPeerId = activeConn.peer || '';
                connectBtn.disabled = true;
                connectBtn.textContent = '已连接';

                if (!asHost) {
                    isHost = false;
                    localPlayer = 'B';
                    roleEl.textContent = '加入者（蓝色）';
                } else {
                    isHost = true;
                    localPlayer = 'A';
                    roleEl.textContent = '房主（绿色）';
                }

                startBtn.disabled = !isHost;
                restartBtn.disabled = !isHost;
                setGameState('已连接，等待房主开始');
                setStatus('连接成功：P2P直连已建立（对端：' + connectedPeerId + '）。');
                log('数据通道已打开，连接成功。');

                if (isHost) {
                    broadcast({ type: 'role', role: 'B' });
                }
            });

            activeConn.on('data', data => {
                if (!data || typeof data !== 'object') return;
                if (data.type === 'input' && isHost) {
                    applyInput('B', data.dir);
                }
                if (data.type === 'state' && !isHost) {
                    applyRemoteState(data.payload);
                }
                if (data.type === 'game_start' && !isHost) {
                    applyRemoteState(data.payload);
                    setGameState('游戏进行中');
                    setStatus('房主已开始游戏。');
                }
                if (data.type === 'game_over' && !isHost) {
                    applyRemoteState(data.payload);
                    setGameState('游戏结束');
                    setStatus(data.message || '游戏结束');
                }
                if (data.type === 'role' && !isHost) {
                    localPlayer = data.role;
                }
            });

            activeConn.on('error', err => {
                const msg = '数据通道错误：' + (err && err.type ? err.type : 'unknown');
                setStatus(msg);
                log(msg);
                isConnecting = false;
                if (!conn || !conn.open) {
                    connectBtn.disabled = false;
                    connectBtn.textContent = '连接好友';
                }
            });

            activeConn.on('close', () => {
                const closedPeer = activeConn.peer || connectedPeerId || '未知';
                if (conn === activeConn) {
                    conn = null;
                    connectedPeerId = '';
                    isHost = false;
                    localPlayer = null;
                    isConnecting = false;
                    connectBtn.disabled = false;
                    connectBtn.textContent = '连接好友';
                    roleEl.textContent = '未连接';
                }
                setStatus('连接已断开。');
                setGameState('等待连接');
                startBtn.disabled = true;
                restartBtn.disabled = true;
                log('数据通道已关闭（对端：' + closedPeer + '）。');
            });
        }

        async function bootstrapPeer() {
            const loaded = await ensurePeerScript();
            if (!loaded || typeof Peer === 'undefined') {
                myIdEl.textContent = '初始化失败';
                setStatus('PeerJS 加载失败，请检查网络或部署文件。');
                setGameState('初始化失败');
                log('PeerJS 加载失败，无法建立连接。');
                return;
            }

            peer = new Peer({
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true,
                debug: 2,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        {
                            urls: 'turn:openrelay.metered.ca:80',
                            username: 'openrelayproject',
                            credential: 'openrelayproject'
                        },
                        {
                            urls: 'turn:openrelay.metered.ca:443',
                            username: 'openrelayproject',
                            credential: 'openrelayproject'
                        }
                    ]
                }
            });

            peer.on('open', id => {
                peerReady = true;
                myIdEl.textContent = id;
                setStatus('ID已生成，等待连接。你可以作为房主被连接，或输入好友ID主动连接。');
                log('Peer 打开成功，ID=' + id);
            });

            peer.on('disconnected', () => {
                peerReady = false;
                setStatus('信令连接断开，尝试重连中...');
                log('Peer disconnected，执行 peer.reconnect()。');
                try {
                    peer.reconnect();
                } catch (err) {
                    log('Peer 重连失败：' + (err && err.message ? err.message : 'unknown'));
                }
            });

            peer.on('close', () => {
                peerReady = false;
                setStatus('Peer 已关闭，请刷新页面重试。');
                log('Peer close。');
            });

            peer.on('error', err => {
                const detail = err && (err.type || err.message) ? (err.type || err.message) : 'unknown';
                setStatus('连接错误：' + detail);
                log('Peer error: ' + detail);
            });

            peer.on('connection', connection => {
                const requesterId = connection.peer || '未知';
                if (conn && conn.open) {
                    log('收到来自 ' + requesterId + ' 的来电，但当前已连接，自动拒绝。');
                    connection.close();
                    return;
                }
                if (isConnecting) {
                    log('收到来自 ' + requesterId + ' 的来电，但本端正在连接中，自动拒绝。');
                    connection.close();
                    return;
                }

                pendingIncomingConn = connection;
                showIncomingRequest(requesterId);
                setStatus('收到连接请求：' + requesterId + '，请选择接受或拒绝。');
                log('收到被动连接请求，等待用户确认。');
            });
        }

        function ensurePeerScript() {
            if (typeof Peer !== 'undefined') {
                log('PeerJS 已存在，跳过脚本加载。');
                return Promise.resolve(true);
            }

            const candidates = [
                './peerjs.min.js',
                'https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js',
                'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js'
            ];

            return new Promise(resolve => {
                const tryLoad = index => {
                    if (index >= candidates.length) {
                        resolve(false);
                        return;
                    }

                    const src = candidates[index];
                    const script = document.createElement('script');
                    script.src = src;
                    script.async = true;
                    script.onload = () => {
                        log('PeerJS 加载成功：' + src);
                        resolve(true);
                    };
                    script.onerror = () => {
                        log('PeerJS 加载失败：' + src);
                        script.remove();
                        tryLoad(index + 1);
                    };
                    document.head.appendChild(script);
                };

                tryLoad(0);
            });
        }

        function log(message) {
            const time = new Date().toLocaleTimeString();
            debugLogEl.textContent += '\n[' + time + '] ' + message;
            debugLogEl.scrollTop = debugLogEl.scrollHeight;
        }

        function showIncomingRequest(requesterId) {
            incomingText.textContent = '收到来自 ' + requesterId + ' 的连接请求';
            incomingBox.style.display = 'flex';
        }

        function hideIncomingRequest() {
            incomingBox.style.display = 'none';
            incomingText.textContent = '收到连接请求';
        }

        function broadcast(message) {
            if (conn && conn.open) {
                conn.send(message);
            }
        }

        document.addEventListener('keydown', e => {
            const dir = keyToDir(e.key);
            if (!dir || !localPlayer) return;

            if (isHost) {
                applyInput('A', dir);
            } else {
                broadcast({ type: 'input', dir });
            }
        });

        function keyToDir(key) {
            if (key === 'ArrowUp' || key === 'w' || key === 'W') return { x: 0, y: -1 };
            if (key === 'ArrowDown' || key === 's' || key === 'S') return { x: 0, y: 1 };
            if (key === 'ArrowLeft' || key === 'a' || key === 'A') return { x: -1, y: 0 };
            if (key === 'ArrowRight' || key === 'd' || key === 'D') return { x: 1, y: 0 };
            return null;
        }

        function applyInput(playerId, dir) {
            if (!dir) return;
            const prev = state.dirs[playerId];
            if (prev.x + dir.x === 0 && prev.y + dir.y === 0) {
                return;
            }
            state.pendingDirs[playerId] = { x: dir.x, y: dir.y };
        }

        function resetState() {
            state.snakes.A = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            state.snakes.B = [
                { x: COLS - 6, y: 10 },
                { x: COLS - 5, y: 10 },
                { x: COLS - 4, y: 10 }
            ];
            state.dirs.A = { x: 1, y: 0 };
            state.dirs.B = { x: -1, y: 0 };
            state.pendingDirs.A = { x: 1, y: 0 };
            state.pendingDirs.B = { x: -1, y: 0 };
            state.scores.A = 0;
            state.scores.B = 0;
            state.gameOver = false;
            state.winner = '';
            state.food = spawnFood();
            gameRunning = true;
            updateScoreboard();
        }

        function spawnFood() {
            while (true) {
                const x = Math.floor(Math.random() * COLS);
                const y = Math.floor(Math.random() * ROWS);
                const occupied = state.snakes.A.concat(state.snakes.B).some(p => p.x === x && p.y === y);
                if (!occupied) return { x, y };
            }
        }

        function startGameLoop() {
            stopGameLoop();
            gameRunning = true;
            gameTimer = setInterval(() => {
                stepGame();
                broadcast({ type: 'state', payload: getPublicState() });
            }, TICK_MS);
        }

        function stopGameLoop() {
            gameRunning = false;
            if (gameTimer) {
                clearInterval(gameTimer);
                gameTimer = null;
            }
        }

        function stepGame() {
            if (!gameRunning || state.gameOver) return;

            state.dirs.A = { ...state.pendingDirs.A };
            state.dirs.B = { ...state.pendingDirs.B };

            const nextA = nextHead(state.snakes.A[0], state.dirs.A);
            const nextB = nextHead(state.snakes.B[0], state.dirs.B);

            const deadA = willDie(nextA, state.snakes.A, state.snakes.B);
            const deadB = willDie(nextB, state.snakes.B, state.snakes.A);
            const headCrash = nextA.x === nextB.x && nextA.y === nextB.y;

            if (deadA || deadB || headCrash) {
                state.gameOver = true;
                stopGameLoop();
                if ((deadA && deadB) || headCrash) {
                    state.winner = '平局';
                } else if (deadA) {
                    state.winner = '蓝色玩家获胜';
                } else {
                    state.winner = '绿色玩家获胜';
                }
                updateScoreboard();
                setGameState('游戏结束');
                setStatus('游戏结束：' + state.winner);
                broadcast({
                    type: 'game_over',
                    message: '游戏结束：' + state.winner,
                    payload: getPublicState()
                });
                return;
            }

            moveSnake('A', nextA);
            moveSnake('B', nextB);
            updateScoreboard();
        }

        function nextHead(head, dir) {
            return { x: head.x + dir.x, y: head.y + dir.y };
        }

        function willDie(next, ownSnake, otherSnake) {
            if (next.x < 0 || next.x >= COLS || next.y < 0 || next.y >= ROWS) return true;
            for (let i = 0; i < ownSnake.length - 1; i++) {
                if (ownSnake[i].x === next.x && ownSnake[i].y === next.y) return true;
            }
            for (let i = 0; i < otherSnake.length; i++) {
                if (otherSnake[i].x === next.x && otherSnake[i].y === next.y) return true;
            }
            return false;
        }

        function moveSnake(playerId, nextHeadPos) {
            const snake = state.snakes[playerId];
            snake.unshift(nextHeadPos);
            if (nextHeadPos.x === state.food.x && nextHeadPos.y === state.food.y) {
                state.scores[playerId] += 1;
                state.food = spawnFood();
            } else {
                snake.pop();
            }
        }

        function getPublicState() {
            return JSON.parse(JSON.stringify(state));
        }

        function applyRemoteState(remoteState) {
            if (!remoteState) return;
            Object.assign(state, remoteState);
            updateScoreboard();
        }

        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        function setGameState(msg) {
            gameStateEl.textContent = msg;
        }

        function updateScoreboard() {
            scoreAEl.textContent = String(state.scores.A);
            scoreBEl.textContent = String(state.scores.B);
        }

        function draw() {
            ctx.fillStyle = '#05080f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            drawFood();
            drawSnake(state.snakes.A, '#62ffc2', '#24c56f');
            drawSnake(state.snakes.B, '#5ecbff', '#2e7dff');

            if (state.gameOver) {
                drawOverlay('游戏结束：' + state.winner);
            }

            requestAnimationFrame(draw);
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(130, 160, 200, 0.12)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += GRID) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += GRID) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function drawFood() {
            ctx.fillStyle = '#ff8e6b';
            roundRect(
                state.food.x * GRID + 3,
                state.food.y * GRID + 3,
                GRID - 6,
                GRID - 6,
                5,
                true
            );
        }

        function drawSnake(snake, headColor, bodyColor) {
            snake.forEach((seg, index) => {
                ctx.fillStyle = index === 0 ? headColor : bodyColor;
                roundRect(
                    seg.x * GRID + 2,
                    seg.y * GRID + 2,
                    GRID - 4,
                    GRID - 4,
                    6,
                    true
                );
            });
        }

        function drawOverlay(text) {
            ctx.fillStyle = 'rgba(3, 6, 14, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 36px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            ctx.font = '16px Microsoft YaHei';
            ctx.fillStyle = '#9fd6ff';
            ctx.fillText('房主可点击“重新开局”继续游戏', canvas.width / 2, canvas.height / 2 + 36);
        }

        function roundRect(x, y, w, h, r, fill) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            if (fill) ctx.fill();
        }

        resetState();
        stopGameLoop();
        setGameState('等待连接');
        draw();

    </script>
</body>
</html>
