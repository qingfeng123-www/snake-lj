<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>双人贪吃蛇 · 稳定联机版</title>
    <link rel="icon" href="data:,">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at top, #1d2b44 0%, #0f1726 40%, #090d16 100%);
            color: #e8f0ff;
            font-family: "Microsoft YaHei", sans-serif;
            padding: 24px 14px 30px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        .panel {
            width: min(900px, 96vw);
            background: rgba(8, 15, 27, 0.75);
            border: 1px solid rgba(170, 220, 255, 0.24);
            border-radius: 16px;
            padding: 16px;
            backdrop-filter: blur(6px);
            box-shadow: 0 16px 40px rgba(2, 10, 20, 0.5);
            margin-bottom: 16px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        .row:last-child {
            margin-bottom: 0;
        }

        input,
        select {
            flex: 1;
            min-width: 180px;
            padding: 10px 12px;
            border: 1px solid #3a5678;
            border-radius: 10px;
            background: #0b1420;
            color: #f2f7ff;
        }

        input[type="checkbox"] {
            flex: 0;
            min-width: auto;
            width: 16px;
            height: 16px;
            padding: 0;
            accent-color: #5ecbff;
        }

        .mini-input {
            min-width: 250px;
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: #06131d;
            font-weight: 700;
            background: linear-gradient(135deg, #62ffc2 0%, #4fd2ff 100%);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .text {
            color: #b7cae6;
            font-size: 14px;
        }

        #status {
            color: #bfe2ff;
            font-size: 15px;
        }

        .scoreboard {
            width: min(900px, 96vw);
            display: flex;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #d8e6ff;
        }

        #game {
            width: min(900px, 96vw);
            border: 2px solid #4fd2ff;
            border-radius: 14px;
            background: #05080f;
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.5);
        }

        .tips {
            width: min(900px, 96vw);
            margin-top: 10px;
            color: #9fb4d3;
            font-size: 13px;
            line-height: 1.6;
        }

        #debugLog {
            width: min(900px, 96vw);
            margin-top: 8px;
            max-height: 170px;
            overflow: auto;
            padding: 10px;
            font-size: 12px;
            color: #a9c8ec;
            background: rgba(6, 12, 22, 0.7);
            border: 1px solid rgba(125, 168, 212, 0.28);
            border-radius: 10px;
            white-space: pre-wrap;
            line-height: 1.45;
        }
    </style>
</head>
<body>
    <h1>双人贪吃蛇（稳定联机版）</h1>

    <div class="panel">
        <div class="row">
            <div>你的ID：<b id="myId">初始化中...</b></div>
            <div class="text">角色：<b id="role">未连接</b></div>
        </div>

        <div class="row">
            <select id="transportMode">
                <option value="peer">WebRTC P2P</option>
                <option value="relay">WebSocket 中继</option>
            </select>
            <input id="relayUrl" class="mini-input" placeholder="relay模式地址，例如 wss://your-domain/ws 或 ws://127.0.0.1:8765">
            <label class="text"><input id="relayOnly" type="checkbox"> P2P仅用TURN中继</label>
            <button id="applyNetBtn">应用网络模式</button>
        </div>

        <div class="row">
            <input id="peerId" placeholder="输入好友ID后点击连接">
            <button id="connectBtn">连接好友</button>
            <button id="startBtn" disabled>开始游戏</button>
            <button id="restartBtn" disabled>重新开局</button>
        </div>

        <div class="row" id="incomingBox" style="display:none;">
            <div class="text" id="incomingText">收到连接请求</div>
            <button id="acceptBtn">接受</button>
            <button id="rejectBtn">拒绝</button>
        </div>

        <div class="row">
            <div id="status">正在初始化连接...</div>
        </div>
    </div>

    <div class="scoreboard">
        <div>绿色玩家（房主）：<b id="scoreA">0</b></div>
        <div>蓝色玩家（加入者）：<b id="scoreB">0</b></div>
        <div>当前状态：<b id="gameState">等待连接</b></div>
    </div>

    <canvas id="game" width="600" height="400"></canvas>
    <div class="tips">
        玩法：方向键/WASD 控制方向。房主（绿色）作为游戏权威状态端。<br>
        推荐流程：A 先打开并把 ID 发给 B，B 点击连接，A 点击接受。<br>
        说明：若日志出现大量 701（TURN/STUN 不可达），切换到 WebSocket 中继模式并填写可达的中继地址。
    </div>
    <pre id="debugLog">[调试日志] 页面已加载，等待初始化...</pre>

    <script>
        const STORAGE_KEY = 'snake_stable_network_v1';
        const RELAY_ID_KEY = 'snake_relay_client_id_v1';
        const DEFAULT_RELAY_URL = 'ws://127.0.0.1:8765';
        const CONNECT_TIMEOUT_MS = 25000;

        const DEFAULT_RTC_CONFIG = {
            iceTransportPolicy: 'all',
            iceServers: [
                { urls: 'stun:stun.cloudflare.com:3478' },
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                {
                    urls: [
                        'turn:openrelay.metered.ca:80?transport=udp',
                        'turn:openrelay.metered.ca:80?transport=tcp',
                        'turn:15.235.47.158:80?transport=tcp'
                    ],
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: [
                        'turn:openrelay.metered.ca:443?transport=tcp',
                        'turns:openrelay.metered.ca:443?transport=tcp'
                    ],
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ]
        };

        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const myIdEl = document.getElementById('myId');
        const roleEl = document.getElementById('role');
        const statusEl = document.getElementById('status');
        const gameStateEl = document.getElementById('gameState');
        const scoreAEl = document.getElementById('scoreA');
        const scoreBEl = document.getElementById('scoreB');
        const transportModeEl = document.getElementById('transportMode');
        const relayUrlEl = document.getElementById('relayUrl');
        const relayOnlyEl = document.getElementById('relayOnly');
        const applyNetBtn = document.getElementById('applyNetBtn');
        const peerIdInput = document.getElementById('peerId');
        const connectBtn = document.getElementById('connectBtn');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const incomingBox = document.getElementById('incomingBox');
        const incomingText = document.getElementById('incomingText');
        const acceptBtn = document.getElementById('acceptBtn');
        const rejectBtn = document.getElementById('rejectBtn');
        const debugLogEl = document.getElementById('debugLog');

        const GRID = 20;
        const COLS = canvas.width / GRID;
        const ROWS = canvas.height / GRID;
        const TICK_MS = 130;

        let peer = null;
        let peerReady = false;
        let dataConn = null;

        let relaySocket = null;
        let relayReady = false;

        let localId = '';
        let connectedPeerId = '';
        let isHost = false;
        let localPlayer = null;

        let isConnecting = false;
        let pendingOutgoingPeerId = '';
        let connectTimeoutId = null;

        let pendingIncoming = {
            kind: '',
            peerId: '',
            conn: null
        };

        let gameTimer = null;
        let gameRunning = false;

        const state = {
            snakes: {
                A: [],
                B: []
            },
            dirs: {
                A: { x: 1, y: 0 },
                B: { x: -1, y: 0 }
            },
            pendingDirs: {
                A: { x: 1, y: 0 },
                B: { x: -1, y: 0 }
            },
            food: { x: 0, y: 0 },
            scores: { A: 0, B: 0 },
            gameOver: false,
            winner: ''
        };

        const isFileProtocol = location.protocol === 'file:';

        if (isFileProtocol) {
            disableAllNetworkControls();
            myIdEl.textContent = '不可用';
            roleEl.textContent = '不可用（需HTTP）';
            setGameState('被浏览器安全策略阻止');
            setStatus('检测到 file://。请先启动 HTTP 服务，再通过 http://127.0.0.1:端口 访问。');
            log('检测到 file 协议，网络功能已禁用。');
        } else {
            restoreNetworkConfig();
            updateNetworkModeUI();
            initNetworkLayer();
        }

        applyNetBtn.addEventListener('click', async () => {
            if (isFileProtocol) return;
            saveNetworkConfig();
            await initNetworkLayer(true);
        });

        transportModeEl.addEventListener('change', () => {
            updateNetworkModeUI();
        });

        connectBtn.addEventListener('click', () => {
            const targetId = peerIdInput.value.trim();
            if (!targetId) {
                alert('请输入对方ID');
                return;
            }
            if (targetId === localId) {
                setStatus('不能连接自己的ID。');
                log('连接失败：目标ID等于自己ID。');
                return;
            }
            if (connectedPeerId) {
                setStatus('当前已连接 ' + connectedPeerId + '，请先刷新页面再连接新目标。');
                log('已连接状态下拒绝二次连接。');
                return;
            }
            if (isConnecting) {
                setStatus('正在连接中，请稍候。');
                return;
            }

            if (getMode() === 'peer') {
                connectByPeer(targetId);
            } else {
                connectByRelay(targetId);
            }
        });

        acceptBtn.addEventListener('click', () => {
            if (!pendingIncoming.kind || !pendingIncoming.peerId) return;
            if (connectedPeerId) {
                hideIncomingRequest();
                clearPendingIncoming();
                return;
            }

            if (pendingIncoming.kind === 'peer') {
                setStatus('正在接受连接请求...');
                isConnecting = true;
                connectBtn.disabled = true;
                connectBtn.textContent = '连接中...';
                dataConn = pendingIncoming.conn;
                setupPeerConnection(dataConn, true);
                clearPendingIncoming();
                return;
            }

            if (pendingIncoming.kind === 'relay') {
                const peerId = pendingIncoming.peerId;
                clearPendingIncoming();
                establishConnection(true, peerId);
                sendRelay({
                    type: 'relay_accept',
                    from: localId,
                    to: peerId
                });
                return;
            }
        });

        rejectBtn.addEventListener('click', () => {
            if (!pendingIncoming.kind || !pendingIncoming.peerId) return;

            const peerId = pendingIncoming.peerId;
            if (pendingIncoming.kind === 'peer' && pendingIncoming.conn) {
                try {
                    pendingIncoming.conn.close();
                } catch (err) {
                    log('拒绝来电时关闭Peer连接失败：' + getErr(err));
                }
            }

            if (pendingIncoming.kind === 'relay') {
                sendRelay({
                    type: 'relay_reject',
                    from: localId,
                    to: peerId,
                    reason: '对方拒绝'
                });
            }

            clearPendingIncoming();
            hideIncomingRequest();
            setStatus('已拒绝连接请求。');
            log('用户拒绝来自 ' + peerId + ' 的连接请求。');
        });

        startBtn.addEventListener('click', () => {
            if (!isHost || !connectedPeerId) return;
            resetState();
            startGameLoop();
            sendTransport({ type: 'game_start', payload: getPublicState() });
            setGameState('游戏进行中');
            setStatus('已开始游戏，祝你好运。');
        });

        restartBtn.addEventListener('click', () => {
            if (!isHost || !connectedPeerId) return;
            resetState();
            startGameLoop();
            sendTransport({ type: 'game_start', payload: getPublicState() });
            setGameState('游戏进行中');
            setStatus('已重新开局。');
        });

        document.addEventListener('keydown', e => {
            const dir = keyToDir(e.key);
            if (!dir || !localPlayer) return;
            if (isHost) {
                applyInput('A', dir);
            } else {
                sendTransport({ type: 'input', dir });
            }
        });

        function getMode() {
            return transportModeEl.value;
        }

        async function initNetworkLayer(forceRebuild = false) {
            setStatus('正在初始化网络层...');

            if (forceRebuild) {
                teardownNetwork();
            }

            if (getMode() === 'peer') {
                await initPeerMode(forceRebuild);
            } else {
                initRelayMode(forceRebuild);
            }
        }

        function teardownNetwork() {
            clearConnectTimer();
            isConnecting = false;
            pendingOutgoingPeerId = '';
            hideIncomingRequest();
            clearPendingIncoming();
            closeActiveSession(false, '重建网络层');

            if (dataConn) {
                try {
                    dataConn.close();
                } catch (err) {
                    log('关闭旧DataConnection失败：' + getErr(err));
                }
                dataConn = null;
            }

            if (peer) {
                try {
                    peer.destroy();
                } catch (err) {
                    log('销毁旧Peer失败：' + getErr(err));
                }
                peer = null;
            }

            peerReady = false;

            if (relaySocket) {
                try {
                    relaySocket.close();
                } catch (err) {
                    log('关闭旧Relay连接失败：' + getErr(err));
                }
                relaySocket = null;
            }

            relayReady = false;
        }

        async function initPeerMode(forceRebuild) {
            if (peer && peerReady && !forceRebuild) {
                return;
            }

            relayReady = false;
            relaySocket = null;

            const loaded = await ensurePeerScript();
            if (!loaded || typeof Peer === 'undefined') {
                setStatus('PeerJS 加载失败，请检查网络。');
                myIdEl.textContent = '初始化失败';
                log('PeerJS 加载失败。');
                return;
            }

            const rtcConfig = JSON.parse(JSON.stringify(DEFAULT_RTC_CONFIG));
            rtcConfig.iceTransportPolicy = relayOnlyEl.checked ? 'relay' : 'all';

            peer = new Peer({
                host: '0.peerjs.com',
                port: 443,
                path: '/',
                secure: true,
                debug: 2,
                config: rtcConfig
            });

            peerReady = false;
            myIdEl.textContent = '生成中...';
            setStatus('正在连接 PeerJS 信令服务器...');
            log('初始化Peer（iceTransportPolicy=' + rtcConfig.iceTransportPolicy + '）');

            peer.on('open', id => {
                peerReady = true;
                localId = id;
                myIdEl.textContent = id;
                setStatus('P2P模式就绪，等待连接。');
                log('Peer 打开成功，ID=' + id);
            });

            peer.on('connection', incomingConn => {
                const from = incomingConn.peer || '未知';
                if (connectedPeerId) {
                    log('收到 ' + from + ' 来电，但当前已连接，自动拒绝。');
                    incomingConn.close();
                    return;
                }

                pendingIncoming = {
                    kind: 'peer',
                    peerId: from,
                    conn: incomingConn
                };
                showIncomingRequest(from);
                setStatus('收到连接请求：' + from + '，请选择接受或拒绝。');
                log('收到Peer来电，等待用户确认。');
            });

            peer.on('error', err => {
                peerReady = false;
                const detail = err && (err.type || err.message) ? (err.type || err.message) : 'unknown';
                setStatus('Peer错误：' + detail);
                log('Peer error: ' + detail);
            });

            peer.on('close', () => {
                peerReady = false;
                if (!connectedPeerId) {
                    setStatus('Peer 已关闭，请点击“应用网络模式”重试。');
                }
                log('Peer close。');
            });

            peer.on('disconnected', () => {
                peerReady = false;
                setStatus('Peer 与信令断开，请点击“应用网络模式”重连。');
                log('Peer disconnected（不自动重建，避免ID频繁变化）。');
            });
        }

        function initRelayMode(forceRebuild) {
            if (relaySocket && relayReady && !forceRebuild) {
                return;
            }

            if (peer) {
                try {
                    peer.destroy();
                } catch (err) {
                    log('切换到Relay时销毁Peer失败：' + getErr(err));
                }
                peer = null;
            }
            peerReady = false;

            const relayUrl = relayUrlEl.value.trim();
            if (!/^wss?:\/\//i.test(relayUrl)) {
                setStatus('中继地址格式错误，请填写 ws:// 或 wss:// 开头地址。');
                myIdEl.textContent = '未连接';
                return;
            }

            localId = getOrCreateRelayClientId();
            myIdEl.textContent = localId;

            setStatus('正在连接 WebSocket 中继...');
            log('连接Relay：' + relayUrl);

            relaySocket = new WebSocket(relayUrl);

            relaySocket.onopen = () => {
                relayReady = true;
                sendRelay({ type: 'register', clientId: localId });
                setStatus('中继模式就绪，等待连接。');
                log('Relay连接成功，已注册 clientId=' + localId);
            };

            relaySocket.onmessage = event => {
                const msg = safeJsonParse(event.data);
                if (!msg) return;
                handleRelayMessage(msg);
            };

            relaySocket.onerror = () => {
                relayReady = false;
                setStatus('Relay连接失败，请检查中继地址或网络。');
                log('Relay socket error。');
            };

            relaySocket.onclose = () => {
                relayReady = false;
                if (!connectedPeerId) {
                    setStatus('Relay连接已关闭，请点击“应用网络模式”重连。');
                }
                log('Relay socket close。');
                closeActiveSession(false, '中继连接关闭');
            };
        }

        function connectByPeer(targetId) {
            if (!peer || !peerReady) {
                setStatus('Peer尚未就绪，请稍后重试。');
                return;
            }

            beginConnectAttempt(targetId);
            dataConn = peer.connect(targetId, {
                reliable: true,
                serialization: 'json'
            });

            setupPeerConnection(dataConn, false);
            log('正在主动连接目标ID：' + targetId);
        }

        function setupPeerConnection(activeConn, asHost) {
            if (!activeConn) return;

            const onOpen = () => {
                establishConnection(asHost, activeConn.peer || pendingOutgoingPeerId);
                if (asHost) {
                    sendTransport({ type: 'role', role: 'B' });
                }
            };

            activeConn.on('open', onOpen);
            if (activeConn.open) {
                onOpen();
            }

            activeConn.on('data', data => {
                handleGameMessage(data);
            });

            activeConn.on('error', err => {
                const msg = '数据通道错误：' + getErr(err);
                setStatus(msg);
                log(msg);
                failConnectAttempt(msg);
            });

            activeConn.on('close', () => {
                if (connectedPeerId === (activeConn.peer || connectedPeerId)) {
                    closeActiveSession(false, '对端关闭连接');
                }
                log('DataConnection close。');
            });

            attachIceDebug(activeConn);
        }

        function connectByRelay(targetId) {
            if (!relayReady || !relaySocket || relaySocket.readyState !== WebSocket.OPEN) {
                setStatus('Relay尚未就绪，请先点击“应用网络模式”。');
                return;
            }

            beginConnectAttempt(targetId);
            sendRelay({
                type: 'relay_offer',
                from: localId,
                to: targetId
            });
            log('通过Relay发送连接请求：' + targetId);
        }

        function handleRelayMessage(msg) {
            if (msg.type === 'register_ack') {
                log('Relay注册确认：' + (msg.clientId || localId));
                return;
            }

            if (msg.type === 'relay_error') {
                log('Relay错误：' + (msg.message || 'unknown'));
                if (isConnecting && msg.to === pendingOutgoingPeerId) {
                    failConnectAttempt('中继转发失败：' + (msg.message || 'unknown'));
                }
                return;
            }

            if (msg.type === 'relay_offer' && msg.to === localId) {
                const from = msg.from || '未知';
                if (connectedPeerId || isConnecting) {
                    sendRelay({
                        type: 'relay_reject',
                        from: localId,
                        to: from,
                        reason: '忙线中'
                    });
                    log('收到 ' + from + ' 的中继来电，当前忙线，自动拒绝。');
                    return;
                }

                pendingIncoming = {
                    kind: 'relay',
                    peerId: from,
                    conn: null
                };
                showIncomingRequest(from);
                setStatus('收到连接请求：' + from + '，请选择接受或拒绝。');
                log('收到Relay来电，等待用户确认。');
                return;
            }

            if (msg.type === 'relay_accept' && msg.to === localId) {
                if (!isConnecting || pendingOutgoingPeerId !== msg.from) return;
                establishConnection(false, msg.from);
                return;
            }

            if (msg.type === 'relay_reject' && msg.to === localId) {
                if (!isConnecting || pendingOutgoingPeerId !== msg.from) return;
                failConnectAttempt('对方拒绝连接：' + (msg.reason || '无原因'));
                return;
            }

            if (msg.type === 'relay_disconnect' && msg.to === localId) {
                if (connectedPeerId === msg.from) {
                    closeActiveSession(false, '对端已断开');
                }
                return;
            }

            if (msg.type === 'relay_payload' && msg.to === localId) {
                if (connectedPeerId && msg.from === connectedPeerId) {
                    handleGameMessage(msg.payload);
                }
            }
        }

        function beginConnectAttempt(targetId) {
            isConnecting = true;
            pendingOutgoingPeerId = targetId;
            connectBtn.disabled = true;
            connectBtn.textContent = '连接中...';
            setStatus('正在连接 ' + targetId + ' ...');

            clearConnectTimer();
            connectTimeoutId = setTimeout(() => {
                failConnectAttempt('连接超时：' + targetId + '（网络可能限制WebRTC/TURN）');
            }, CONNECT_TIMEOUT_MS);
        }

        function failConnectAttempt(message) {
            clearConnectTimer();
            isConnecting = false;
            pendingOutgoingPeerId = '';
            connectBtn.disabled = false;
            connectBtn.textContent = '连接好友';
            setStatus(message);
            log(message);
        }

        function establishConnection(asHost, peerId) {
            clearConnectTimer();
            isConnecting = false;
            pendingOutgoingPeerId = '';
            connectedPeerId = peerId || '';
            localPlayer = asHost ? 'A' : 'B';
            isHost = asHost;

            connectBtn.disabled = true;
            connectBtn.textContent = '已连接';
            startBtn.disabled = !isHost;
            restartBtn.disabled = !isHost;
            roleEl.textContent = asHost ? '房主（绿色）' : '加入者（蓝色）';

            hideIncomingRequest();
            clearPendingIncoming();

            setGameState('已连接，等待房主开始');
            setStatus('连接成功：' + connectedPeerId);
            log('连接建立成功：peer=' + connectedPeerId + '，mode=' + getMode());
        }

        function clearConnectTimer() {
            if (connectTimeoutId) {
                clearTimeout(connectTimeoutId);
                connectTimeoutId = null;
            }
        }

        function closeActiveSession(notifyPeer, reason) {
            if (notifyPeer && connectedPeerId && getMode() === 'relay' && relayReady) {
                sendRelay({
                    type: 'relay_disconnect',
                    from: localId,
                    to: connectedPeerId
                });
            }

            connectedPeerId = '';
            isHost = false;
            localPlayer = null;
            startBtn.disabled = true;
            restartBtn.disabled = true;
            connectBtn.disabled = false;
            connectBtn.textContent = '连接好友';
            roleEl.textContent = '未连接';
            setGameState('等待连接');

            if (reason) {
                setStatus(reason);
                log(reason);
            }
        }

        function sendTransport(payload) {
            if (!connectedPeerId) return;

            if (getMode() === 'peer') {
                if (dataConn && dataConn.open) {
                    dataConn.send(payload);
                }
                return;
            }

            sendRelay({
                type: 'relay_payload',
                from: localId,
                to: connectedPeerId,
                payload
            });
        }

        function sendRelay(message) {
            if (!relaySocket || relaySocket.readyState !== WebSocket.OPEN) {
                return;
            }
            relaySocket.send(JSON.stringify(message));
        }

        function handleGameMessage(data) {
            if (!data || typeof data !== 'object') return;

            if (data.type === 'input' && isHost) {
                applyInput('B', data.dir);
                return;
            }

            if (data.type === 'state' && !isHost) {
                applyRemoteState(data.payload);
                return;
            }

            if (data.type === 'game_start' && !isHost) {
                applyRemoteState(data.payload);
                setGameState('游戏进行中');
                setStatus('房主已开始游戏。');
                return;
            }

            if (data.type === 'game_over' && !isHost) {
                applyRemoteState(data.payload);
                setGameState('游戏结束');
                setStatus(data.message || '游戏结束');
                return;
            }

            if (data.type === 'role' && !isHost) {
                localPlayer = data.role;
            }
        }

        function attachIceDebug(activeConn) {
            const pc = activeConn.peerConnection;
            if (!pc) {
                log('ICE调试：peerConnection 不可用。');
                return;
            }

            log('ICE调试已挂载。');

            pc.addEventListener('iceconnectionstatechange', () => {
                log('ICE状态：' + pc.iceConnectionState);
            });

            pc.addEventListener('connectionstatechange', () => {
                log('RTCPeerConnection状态：' + pc.connectionState);
            });

            pc.addEventListener('icegatheringstatechange', () => {
                log('ICE采集状态：' + pc.iceGatheringState);
            });

            pc.addEventListener('icecandidateerror', event => {
                const url = event && event.url ? event.url : 'unknown';
                const code = event && typeof event.errorCode !== 'undefined' ? event.errorCode : 'unknown';
                const text = event && event.errorText ? event.errorText : 'unknown';
                log('ICE候选错误 url=' + url + ' code=' + code + ' text=' + text);
                if (code === 701) {
                    setStatus('检测到 701：当前网络无法访问TURN/STUN，建议切换到WebSocket中继模式。');
                }
            });
        }

        function ensurePeerScript() {
            if (typeof Peer !== 'undefined') {
                return Promise.resolve(true);
            }

            const candidates = [
                './peerjs.min.js',
                'https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js',
                'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js'
            ];

            return new Promise(resolve => {
                const tryLoad = index => {
                    if (index >= candidates.length) {
                        resolve(false);
                        return;
                    }

                    const src = candidates[index];
                    const script = document.createElement('script');
                    script.src = src;
                    script.async = true;
                    script.onload = () => {
                        log('PeerJS 加载成功：' + src);
                        resolve(true);
                    };
                    script.onerror = () => {
                        log('PeerJS 加载失败：' + src);
                        script.remove();
                        tryLoad(index + 1);
                    };
                    document.head.appendChild(script);
                };

                tryLoad(0);
            });
        }

        function disableAllNetworkControls() {
            transportModeEl.disabled = true;
            relayUrlEl.disabled = true;
            relayOnlyEl.disabled = true;
            applyNetBtn.disabled = true;
            peerIdInput.disabled = true;
            connectBtn.disabled = true;
            startBtn.disabled = true;
            restartBtn.disabled = true;
            acceptBtn.disabled = true;
            rejectBtn.disabled = true;
        }

        function saveNetworkConfig() {
            const cfg = {
                mode: getMode(),
                relayUrl: relayUrlEl.value.trim(),
                relayOnly: relayOnlyEl.checked
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
        }

        function restoreNetworkConfig() {
            relayUrlEl.value = DEFAULT_RELAY_URL;
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            const cfg = safeJsonParse(raw);
            if (!cfg || typeof cfg !== 'object') return;

            if (cfg.mode === 'peer' || cfg.mode === 'relay') {
                transportModeEl.value = cfg.mode;
            }
            if (typeof cfg.relayUrl === 'string' && cfg.relayUrl.trim()) {
                relayUrlEl.value = cfg.relayUrl.trim();
            }
            relayOnlyEl.checked = Boolean(cfg.relayOnly);
        }

        function updateNetworkModeUI() {
            const relayMode = getMode() === 'relay';
            relayUrlEl.style.display = relayMode ? 'block' : 'none';
        }

        function getOrCreateRelayClientId() {
            const cached = localStorage.getItem(RELAY_ID_KEY);
            if (cached) return cached;

            let id = '';
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                id = crypto.randomUUID();
            } else {
                id = 'relay-' + Math.random().toString(36).slice(2, 10);
            }
            localStorage.setItem(RELAY_ID_KEY, id);
            return id;
        }

        function showIncomingRequest(peerId) {
            incomingText.textContent = '收到来自 ' + peerId + ' 的连接请求';
            incomingBox.style.display = 'flex';
        }

        function hideIncomingRequest() {
            incomingBox.style.display = 'none';
            incomingText.textContent = '收到连接请求';
        }

        function clearPendingIncoming() {
            pendingIncoming = {
                kind: '',
                peerId: '',
                conn: null
            };
        }

        function safeJsonParse(raw) {
            try {
                return JSON.parse(raw);
            } catch (err) {
                return null;
            }
        }

        function getErr(err) {
            if (!err) return 'unknown';
            return err.type || err.message || String(err);
        }

        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        function setGameState(msg) {
            gameStateEl.textContent = msg;
        }

        function log(message) {
            const time = new Date().toLocaleTimeString();
            debugLogEl.textContent += '\n[' + time + '] ' + message;
            debugLogEl.scrollTop = debugLogEl.scrollHeight;
        }

        function updateScoreboard() {
            scoreAEl.textContent = String(state.scores.A);
            scoreBEl.textContent = String(state.scores.B);
        }

        function keyToDir(key) {
            if (key === 'ArrowUp' || key === 'w' || key === 'W') return { x: 0, y: -1 };
            if (key === 'ArrowDown' || key === 's' || key === 'S') return { x: 0, y: 1 };
            if (key === 'ArrowLeft' || key === 'a' || key === 'A') return { x: -1, y: 0 };
            if (key === 'ArrowRight' || key === 'd' || key === 'D') return { x: 1, y: 0 };
            return null;
        }

        function applyInput(playerId, dir) {
            if (!dir) return;
            const prev = state.dirs[playerId];
            if (prev.x + dir.x === 0 && prev.y + dir.y === 0) return;
            state.pendingDirs[playerId] = { x: dir.x, y: dir.y };
        }

        function resetState() {
            state.snakes.A = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            state.snakes.B = [
                { x: COLS - 6, y: 10 },
                { x: COLS - 5, y: 10 },
                { x: COLS - 4, y: 10 }
            ];
            state.dirs.A = { x: 1, y: 0 };
            state.dirs.B = { x: -1, y: 0 };
            state.pendingDirs.A = { x: 1, y: 0 };
            state.pendingDirs.B = { x: -1, y: 0 };
            state.scores.A = 0;
            state.scores.B = 0;
            state.gameOver = false;
            state.winner = '';
            state.food = spawnFood();
            gameRunning = true;
            updateScoreboard();
        }

        function spawnFood() {
            while (true) {
                const x = Math.floor(Math.random() * COLS);
                const y = Math.floor(Math.random() * ROWS);
                const occupied = state.snakes.A.concat(state.snakes.B).some(p => p.x === x && p.y === y);
                if (!occupied) return { x, y };
            }
        }

        function startGameLoop() {
            stopGameLoop();
            gameRunning = true;
            gameTimer = setInterval(() => {
                stepGame();
                if (isHost && connectedPeerId) {
                    sendTransport({ type: 'state', payload: getPublicState() });
                }
            }, TICK_MS);
        }

        function stopGameLoop() {
            gameRunning = false;
            if (gameTimer) {
                clearInterval(gameTimer);
                gameTimer = null;
            }
        }

        function stepGame() {
            if (!gameRunning || state.gameOver) return;

            state.dirs.A = { ...state.pendingDirs.A };
            state.dirs.B = { ...state.pendingDirs.B };

            const nextA = nextHead(state.snakes.A[0], state.dirs.A);
            const nextB = nextHead(state.snakes.B[0], state.dirs.B);

            const deadA = willDie(nextA, state.snakes.A, state.snakes.B);
            const deadB = willDie(nextB, state.snakes.B, state.snakes.A);
            const headCrash = nextA.x === nextB.x && nextA.y === nextB.y;

            if (deadA || deadB || headCrash) {
                state.gameOver = true;
                stopGameLoop();

                if ((deadA && deadB) || headCrash) {
                    state.winner = '平局';
                } else if (deadA) {
                    state.winner = '蓝色玩家获胜';
                } else {
                    state.winner = '绿色玩家获胜';
                }

                updateScoreboard();
                setGameState('游戏结束');
                setStatus('游戏结束：' + state.winner);

                if (isHost && connectedPeerId) {
                    sendTransport({
                        type: 'game_over',
                        message: '游戏结束：' + state.winner,
                        payload: getPublicState()
                    });
                }
                return;
            }

            moveSnake('A', nextA);
            moveSnake('B', nextB);
            updateScoreboard();
        }

        function nextHead(head, dir) {
            return { x: head.x + dir.x, y: head.y + dir.y };
        }

        function willDie(next, ownSnake, otherSnake) {
            if (next.x < 0 || next.x >= COLS || next.y < 0 || next.y >= ROWS) return true;
            for (let i = 0; i < ownSnake.length - 1; i++) {
                if (ownSnake[i].x === next.x && ownSnake[i].y === next.y) return true;
            }
            for (let i = 0; i < otherSnake.length; i++) {
                if (otherSnake[i].x === next.x && otherSnake[i].y === next.y) return true;
            }
            return false;
        }

        function moveSnake(playerId, nextHeadPos) {
            const snake = state.snakes[playerId];
            snake.unshift(nextHeadPos);
            if (nextHeadPos.x === state.food.x && nextHeadPos.y === state.food.y) {
                state.scores[playerId] += 1;
                state.food = spawnFood();
            } else {
                snake.pop();
            }
        }

        function getPublicState() {
            return JSON.parse(JSON.stringify(state));
        }

        function applyRemoteState(remoteState) {
            if (!remoteState) return;
            Object.assign(state, remoteState);
            updateScoreboard();
        }

        function draw() {
            ctx.fillStyle = '#05080f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            drawFood();
            drawSnake(state.snakes.A, '#62ffc2', '#24c56f');
            drawSnake(state.snakes.B, '#5ecbff', '#2e7dff');

            if (state.gameOver) {
                drawOverlay('游戏结束：' + state.winner);
            }

            requestAnimationFrame(draw);
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(130, 160, 200, 0.12)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += GRID) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += GRID) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function drawFood() {
            ctx.fillStyle = '#ff8e6b';
            roundRect(
                state.food.x * GRID + 3,
                state.food.y * GRID + 3,
                GRID - 6,
                GRID - 6,
                5,
                true
            );
        }

        function drawSnake(snake, headColor, bodyColor) {
            snake.forEach((seg, index) => {
                ctx.fillStyle = index === 0 ? headColor : bodyColor;
                roundRect(
                    seg.x * GRID + 2,
                    seg.y * GRID + 2,
                    GRID - 4,
                    GRID - 4,
                    6,
                    true
                );
            });
        }

        function drawOverlay(text) {
            ctx.fillStyle = 'rgba(3, 6, 14, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 36px Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            ctx.font = '16px Microsoft YaHei';
            ctx.fillStyle = '#9fd6ff';
            ctx.fillText('房主可点击“重新开局”继续游戏', canvas.width / 2, canvas.height / 2 + 36);
        }

        function roundRect(x, y, w, h, r, fill) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            if (fill) ctx.fill();
        }

        resetState();
        stopGameLoop();
        setGameState('等待连接');
        draw();
    </script>
</body>
</html>
